<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCA — Standardisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* standardise.html — unique styles only */
    .stats-compare { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 2.5rem; }
    .stat-name   { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .stat-before { font-size: 0.8rem; font-family: var(--mono); color: var(--warn); margin-bottom: 2px; }
    .stat-after  { font-size: 0.8rem; font-family: var(--mono); color: var(--success); }

    .col-breakdown { background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 2.5rem; }
    .col-row { display: grid; grid-template-columns: 140px 1fr 1fr 1fr 1fr; gap: 0; border-bottom: 1px solid var(--border); align-items: center; }
    .col-row:first-child { background: var(--bg-3); }
    .col-row:last-child { border-bottom: none; }
    .col-row:hover { background: rgba(255,255,255,0.02); }
    .col-cell { padding: 0.65rem 1rem; font-family: var(--mono); font-size: 0.82rem; color: var(--text); border-right: 1px solid var(--border); }
    .col-cell:last-child { border-right: none; }
    .col-cell.header  { color: var(--text-muted); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
    .col-cell.name    { font-family: var(--sans); font-size: 0.85rem; font-weight: 500; }
    .col-cell.accent  { color: var(--accent); }
    .col-cell.success { color: var(--success); }

    @media (max-width: 640px) {
      .stats-compare { grid-template-columns: 1fr 1fr; }
      .col-row { grid-template-columns: 110px 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="badge">Step 3 of 5</div>
    <h1>Standard<span>isation</span></h1>
    <p class="subtitle">Transforming your data so every variable speaks the same language.</p>
  </header>

  <nav class="steps-nav">
    <div class="step-item done"><div class="step-num">✓</div> Upload</div>
    <div class="step-item done"><div class="step-num">✓</div> Data matrix</div>
    <div class="step-item active"><div class="step-num">3</div> Standardise</div>
    <div class="step-item"><div class="step-num">4</div> Covariance</div>
    <div class="step-item"><div class="step-num">5</div> Eigen decomp</div>
  </nav>

  <div id="main-content">
    <div class="no-data">No data found — <a href="index.html" style="color:var(--accent)">go back and upload a CSV</a></div>
  </div>

</div>
<script>
  const stored = localStorage.getItem('pca_matrix');
  if (stored) {
    const { headers, matrix } = JSON.parse(stored);
    renderPage(headers, matrix);
  }

  function mean(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
  function std(arr) {
    const m = mean(arr);
    return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/(arr.length-1));
  }

  function standardise(matrix, headers) {
    const stats = headers.map((_, j) => {
      const col = matrix.map(r => r[j]);
      return { mean: mean(col), std: std(col) };
    });
    const Z = matrix.map(row =>
      row.map((val, j) => (val - stats[j].mean) / stats[j].std)
    );
    return { Z, stats };
  }

  function fmt(v, d=4) {
    if (isNaN(v)) return '—';
    return v.toFixed(d);
  }

  function fmtRaw(v) {
    if (Math.abs(v) >= 1000) return v.toLocaleString('en-GB', { maximumFractionDigits: 1 });
    if (Math.abs(v) >= 10)   return v.toFixed(2);
    return v.toFixed(4);
  }

  function heatClass(v) {
    if (v >  1.0) return 'pos';
    if (v < -1.0) return 'neg';
    return 'zero';
  }

  function renderPage(headers, matrix) {
    const { Z, stats } = standardise(matrix, headers);
    const n = matrix.length, p = headers.length;

    // Save Z for downstream steps
    localStorage.setItem('pca_Z', JSON.stringify({ headers, Z, stats }));

    const content = document.getElementById('main-content');
    content.innerHTML = '';
    content.classList.add('fade-in');

    // ── Explainer ──
    appendHTML(content, `
      <div class="explainer">
        <h2>The problem with raw data</h2>
        <p>PCA finds directions of maximum variance. If your columns have very different scales — say, income in thousands and age in decades — the large-scale column dominates simply because its numbers are bigger, not because it's more informative.</p>
        <p>Standardisation puts every column on equal footing. For each column <em>j</em>, we subtract its mean and divide by its standard deviation:</p>
        <div class="math">z<sub>ij</sub> = (x<sub>ij</sub> − μ<sub>j</sub>) / σ<sub>j</sub></div>
        <p>After this transform, every column has <strong style="color:#fff">mean = 0</strong> and <strong style="color:#fff">std = 1</strong>. PCA can then measure variance fairly across all features.</p>
      </div>
    `);

    // ── Per-column breakdown ──
    appendHTML(content, `<div class="section-title">What changes per column</div>`);

    const breakdown = document.createElement('div');
    breakdown.className = 'col-breakdown';
    breakdown.style.cssText = 'background:var(--bg-2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:2.5rem';

    breakdown.innerHTML = `
      <div class="col-row">
        <div class="col-cell header">Variable</div>
        <div class="col-cell header">μ (mean)</div>
        <div class="col-cell header">σ (std dev)</div>
        <div class="col-cell header accent">→ new mean</div>
        <div class="col-cell header success">→ new std</div>
      </div>
      ${headers.map((h, j) => `
        <div class="col-row">
          <div class="col-cell name">${h}</div>
          <div class="col-cell">${fmtRaw(stats[j].mean)}</div>
          <div class="col-cell">${fmtRaw(stats[j].std)}</div>
          <div class="col-cell accent">≈ 0</div>
          <div class="col-cell success">= 1</div>
        </div>
      `).join('')}
    `;
    content.appendChild(breakdown);

    // ── Side-by-side tables ──
    appendHTML(content, `<div class="section-title">Before vs after — first ${Math.min(n,8)} rows</div>`);

    const MAX_SHOW = Math.min(n, 8);
    const MAX_COLS = Math.min(p, 5);

    const sbs = document.createElement('div');
    sbs.className = 'side-by-side';

    // Before panel
    const beforePanel = document.createElement('div');
    beforePanel.className = 'panel';
    beforePanel.innerHTML = `
      <div class="panel-header">
        <span class="panel-title">X — raw data</span>
        <span class="panel-badge before">original scale</span>
      </div>
      <div class="panel-body">
        <table class="mini-table">
          <thead><tr>
            <th>#</th>
            ${headers.slice(0,MAX_COLS).map(h=>`<th>${h}</th>`).join('')}
            ${p > MAX_COLS ? '<th>…</th>' : ''}
          </tr></thead>
          <tbody>
            ${matrix.slice(0,MAX_SHOW).map((row,i)=>`
              <tr>
                <td>${i+1}</td>
                ${row.slice(0,MAX_COLS).map(v=>`<td>${fmtRaw(v)}</td>`).join('')}
                ${p > MAX_COLS ? '<td>…</td>' : ''}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;

    // After panel
    const afterPanel = document.createElement('div');
    afterPanel.className = 'panel';
    afterPanel.innerHTML = `
      <div class="panel-header">
        <span class="panel-title">Z — standardised</span>
        <span class="panel-badge after">μ=0, σ=1</span>
      </div>
      <div class="panel-body">
        <table class="mini-table">
          <thead><tr>
            <th>#</th>
            ${headers.slice(0,MAX_COLS).map(h=>`<th>${h}</th>`).join('')}
            ${p > MAX_COLS ? '<th>…</th>' : ''}
          </tr></thead>
          <tbody>
            ${Z.slice(0,MAX_SHOW).map((row,i)=>`
              <tr>
                <td>${i+1}</td>
                ${row.slice(0,MAX_COLS).map(v=>`<td class="${heatClass(v)}">${fmt(v,3)}</td>`).join('')}
                ${p > MAX_COLS ? '<td>…</td>' : ''}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;

    sbs.appendChild(beforePanel);
    sbs.appendChild(afterPanel);
    content.appendChild(sbs);

    appendHTML(content, `
      <p style="font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-bottom:2.5rem;text-align:center">
        Orange = more than 1σ above mean &nbsp;·&nbsp; Blue = more than 1σ below mean &nbsp;·&nbsp; all values now dimensionless
      </p>
    `);

    // ── The numpy code ──
    appendHTML(content, `<div class="section-title">The code doing this</div>`);

    const meanVals = stats.map(s => fmtRaw(s.mean));
    const stdVals  = stats.map(s => fmtRaw(s.std));

    const codeParts = `<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># X is your data matrix — shape (${n}, ${p})</span>
<span class="va">X</span> = np.<span class="fn">array</span>(data)  <span class="cm"># shape: (${n}, ${p})</span>

<span class="cm"># Compute mean and std for each column</span>
<span class="va">mu</span>    = X.<span class="fn">mean</span>(axis=<span class="nm">0</span>)   <span class="cm"># shape: (${p},)</span>
<span class="va">sigma</span> = X.<span class="fn">std</span>(axis=<span class="nm">0</span>, ddof=<span class="nm">1</span>)  <span class="cm"># ddof=1 for sample std</span>

<span class="cm"># Standardise: subtract mean, divide by std</span>
<span class="va">Z</span> = (X - mu) / sigma  <span class="cm"># shape: (${n}, ${p})</span>

<span class="cm"># Verify: each column now has mean≈0, std=1</span>
<span class="fn">print</span>(Z.<span class="fn">mean</span>(axis=<span class="nm">0</span>))  <span class="cm"># → [~0, ~0, ...]</span>
<span class="fn">print</span>(Z.<span class="fn">std</span>(axis=<span class="nm">0</span>, ddof=<span class="nm">1</span>))   <span class="cm"># → [1.0, 1.0, ...]</span>

<span class="cm"># Your computed values:</span>
<span class="va">mu</span>    = np.<span class="fn">array</span>([${meanVals.join(', ')}])
<span class="va">sigma</span> = np.<span class="fn">array</span>([${stdVals.join(', ')}])`;

    const codePane = document.createElement('div');
    codePane.className = 'code-pane';
    codePane.innerHTML = `
      <div class="code-header">
        <div class="code-dot" style="background:#ff5f57"></div>
        <div class="code-dot" style="background:#febc2e"></div>
        <div class="code-dot" style="background:#28c840"></div>
        <span class="code-filename">standardise.py</span>
      </div>
      <div class="code-body"><pre>${codeParts}</pre></div>
    `;
    content.appendChild(codePane);

    // ── Stats comparison ──
    appendHTML(content, `<div class="section-title">Verification — column stats after standardisation</div>`);

    const statsGrid = document.createElement('div');
    statsGrid.className = 'stats-compare';

    const STAT_COLS = Math.min(p, 6);
    headers.slice(0, STAT_COLS).forEach((h, j) => {
      const zCol = Z.map(r => r[j]);
      const zMean = mean(zCol);
      const zStd  = std(zCol);
      statsGrid.innerHTML += `
        <div class="stat-card">
          <div class="stat-name">${h}</div>
          <div class="stat-label">mean</div>
          <div class="stat-before">before: ${fmtRaw(stats[j].mean)}</div>
          <div class="stat-after">after: ${zMean.toFixed(10) < 1e-9 ? '≈ 0' : zMean.toFixed(6)}</div>
          <div class="stat-label" style="margin-top:8px">std dev</div>
          <div class="stat-before">before: ${fmtRaw(stats[j].std)}</div>
          <div class="stat-after">after: 1.000000</div>
        </div>
      `;
    });
    content.appendChild(statsGrid);

    // ── What's next ──
    appendHTML(content, `
      <div class="explainer">
        <h2>What we have now</h2>
        <p>Matrix <strong style="color:#fff">Z</strong> — shape (${n}×${p}) — where every column has mean 0 and standard deviation 1. The data is now scale-invariant.</p>
        <p>Next: we compute the <strong style="color:#fff">covariance matrix</strong> of Z. This is a ${p}×${p} matrix that captures how much every pair of variables moves together. It's the heart of PCA.</p>
        <div class="math">Σ = (1/(n−1)) · Zᵀ Z</div>
      </div>
    `);

    // ── CTA ──
    appendHTML(content, `
      <div class="cta-row">
        <button class="btn btn-primary" onclick="window.location.href='covariance.html'">Proceed to covariance matrix →</button>
        <button class="btn btn-ghost" onclick="window.location.href='matrix.html'">← Back to data matrix</button>
      </div>
    `);
  }

  function appendHTML(parent, html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    while (div.firstChild) parent.appendChild(div.firstChild);
  }
</script>
</body>
</html>
